<!doctype html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}MasterScanner{% endblock %}</title>

  <!-- Tailwind: CDN build for dev speed. Swap for the CLI-built
       static/dist/output.css in production per migration-requirements §7. -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // Theme extended from design-tokens.json — single source of truth.
    // (design-tokens.json was not provided with this migration; values
    // below are reasonable placeholders for a dark trading-terminal
    // palette. Replace with the real token values before sign-off,
    // per §7 "Do not hardcode hex values directly in templates.")
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            'bg-0': '#0B0E14',
            'bg-1': '#11161F',
            'bg-2': '#181F2B',
            'border-0': '#232B3A',
            'text-0': '#E6EDF3',
            'text-1': '#8B98A9',
            'interactive': '#3B82F6',
            'elite': '#F5B700',
            'actionable': '#22C55E',
            'watch': '#38BDF8',
            'monitor': '#64748B',
            'danger': '#EF4444',
          },
          fontFamily: {
            mono: ['"JetBrains Mono"', 'ui-monospace', 'monospace'],
            sans: ['Inter', 'ui-sans-serif', 'system-ui'],
          },
        },
      },
    };
  </script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script src="https://unpkg.com/htmx.org/dist/ext/sse.js"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}" />
</head>
<body class="bg-bg-0 text-text-0 font-sans min-h-screen" hx-ext="sse">

  <header class="border-b border-border-0 bg-bg-1">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="{{ url_for('dashboard.index') }}" class="flex items-center gap-2">
        <span class="text-interactive font-mono font-bold text-lg">MasterScanner</span>
      </a>
      <nav class="hidden md:flex items-center gap-6 text-sm text-text-1">
        <a href="{{ url_for('dashboard.index') }}"
           class="hover:text-text-0 focus:outline-none focus:ring-2 focus:ring-interactive rounded px-1">Dashboard</a>
        <a href="{{ url_for('heatmap.sectors') }}"
           class="hover:text-text-0 focus:outline-none focus:ring-2 focus:ring-interactive rounded px-1">Sectors</a>
        <a href="{{ url_for('lifecycle.trades') }}"
           class="hover:text-text-0 focus:outline-none focus:ring-2 focus:ring-interactive rounded px-1">Trades</a>
        <a href="{{ url_for('mobile.mobile_home') }}"
           class="hover:text-text-0 focus:outline-none focus:ring-2 focus:ring-interactive rounded px-1">Mobile view</a>
      </nav>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 py-6">
    {% block content %}{% endblock %}
  </main>

  <!-- Drawer target lives outside the block so it never causes layout
       shift when swapped (§8.1). -->
  <div id="drawer-backdrop" class="fixed inset-0 bg-black/50 hidden" onclick="document.getElementById('drawer-backdrop').classList.add('hidden'); document.getElementById('drawer').innerHTML='';"></div>
  <div id="drawer" class="fixed top-0 right-0 h-full w-full sm:w-[420px] bg-bg-1 border-l border-border-0 z-50 translate-x-full transition-transform"></div>

  <script src="{{ url_for('static', filename='js/arc.js') }}"></script>
  <script src="{{ url_for('static', filename='js/live.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
